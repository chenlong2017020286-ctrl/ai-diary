name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create iOS platform files
        run: flutter create --platforms ios --org com.aidiary --project-name ai_diary .

      - name: Install dependencies
        run: flutter pub get

      - name: Disable code signing
        run: |
          python3 << 'PYEOF'
          import pathlib, re
          pbx = pathlib.Path('ios/Runner.xcodeproj/project.pbxproj')
          content = pbx.read_text()

          remove_keys = ['DEVELOPMENT_TEAM', 'CODE_SIGN_STYLE', 'CODE_SIGN_IDENTITY',
                         'PROVISIONING_PROFILE_SPECIFIER', 'PROVISIONING_PROFILE']
          for key in remove_keys:
              content = re.sub(rf'^\s*{key}\s*=\s*[^;\n]*;\s*\n', '', content, flags=re.MULTILINE)

          new_settings = (
              '\t\t\t\tDEVELOPMENT_TEAM = XXXXXXXXXX;\n'
              '\t\t\t\tCODE_SIGN_STYLE = Manual;\n'
              '\t\t\t\tCODE_SIGN_IDENTITY = "";\n'
              '\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "";\n'
          )
          content = content.replace('buildSettings = {\n', f'buildSettings = {{\n{new_settings}')
          pbx.write_text(content)
          print('Code signing disabled (fake team + manual)')
          PYEOF

      - name: Build iOS release (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p output
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr ../../../output/AIDiary-unsigned.ipa Payload/
          cd ../../..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIDiary-Unsigned-iOS-IPA
          path: output/AIDiary-unsigned.ipa
          retention-days: 30
