name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create iOS platform files
        run: flutter create --platforms ios --org com.aidiary --project-name ai_diary .

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS release (unsigned)
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir -p output
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -qr ../../../output/AIDiary-unsigned.ipa Payload/
          cd ../../..

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIDiary-Unsigned-iOS-IPA
          path: output/AIDiary-unsigned.ipa
          retention-days: 30
